<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- A renderer-side CSP mirror of the one the main process sets on responses.
         Belt-and-braces: no remote anything, no inline scripts. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Therapy Practice Assistant</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
